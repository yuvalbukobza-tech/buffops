// ── UTILIZATION ALGORITHM ────────────────────────────────────────────────────
// Fewer pulses = higher utilization (you control timing, avoid night drops)
// More pulses  = lower utilization (some pulses inevitably fall at night)

const DEMAND_BASE = {
  "Low": 0.40,
  "Medium": 0.65,
  "High": 0.82,
  "Very High": 0.95
};
function pulseFactor(pulsesPerDay) {
  if (pulsesPerDay <= 1) return 1.00;
  if (pulsesPerDay <= 2) return 0.88;
  if (pulsesPerDay <= 3) return 0.80;
  if (pulsesPerDay <= 4) return 0.72;
  if (pulsesPerDay <= 6) return 0.64;
  if (pulsesPerDay <= 8) return 0.56;
  return 0.50;
}
function calcUtilization(demandLevel, pulsesPerDay) {
  return (DEMAND_BASE[demandLevel] ?? 0.65) * pulseFactor(pulsesPerDay);
}
